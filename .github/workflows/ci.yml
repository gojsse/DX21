name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - os: macos-latest
            arch: x86_64
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
          - os: windows-latest
            arch: x86_64
            cmake_args: ""
          - os: ubuntu-latest
            arch: x86_64
            cmake_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build web UI (embedded into the plugin)
        run: |
          npm ci
          npm run build

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxcomposite-dev libxdamage-dev libxrender-dev libxext-dev libwebkit2gtk-4.1-dev libgtk-3-dev libpulse-dev libasound2-dev

      - name: Restore WebView2 SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory "${{ github.workspace }}/nuget" -ExcludeVersion
          "WEBVIEW2_ARG=-DJUCE_WEBVIEW2_PACKAGE_LOCATION=${{ github.workspace }}/nuget" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create build directory
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }} ${{ env.WEBVIEW2_ARG }}

      - name: Build (all formats)
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Pluginval (macOS)
        if: runner.os == 'macOS'
        run: |
          # TODO: download/run pluginval
          # pluginval --strictness 8 build/OP4_artefacts/Release/AU/...
          echo "TODO: pluginval validation"
        continue-on-error: true

      - name: Pluginval (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "TODO: pluginval validation"
        continue-on-error: true

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-format check
        run: |
          clang-format --version
          # TODO: add clang-format config and check
        continue-on-error: true
